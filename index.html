<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top Actu Foot 13 - Pronostics</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #0b1020;
      color: #f5f7fb;
    }

    .page {
      max-width: 1200px;
      margin: auto;
      padding: 30px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 18px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 20px;
    }

    .match {
      font-size: 22px;
      font-weight: bold;
    }

    .pick-box {
      margin-top: 10px;
      padding: 12px;
      background: rgba(91,124,255,0.2);
      border-radius: 12px;
    }

    .metric {
      margin-top: 10px;
    }

    .factor {
      display: inline-block;
      margin: 4px;
      padding: 6px 10px;
      background: rgba(255,255,255,0.08);
      border-radius: 10px;
    }

    .loading {
      text-align: center;
      padding: 40px;
    }
  </style>
</head>

<body>

<div class="page">

  <h1>Pronostics du jour</h1>
  <p id="generatedAtLabel">Chargement...</p>

  <div class="cards-grid" id="predictionsContainer">
    <div class="loading">Chargement...</div>
  </div>

</div>

<script>

let allPredictions = [];

async function loadPredictions() {
  const container = document.getElementById("predictionsContainer");
  const generatedAtLabel = document.getElementById("generatedAtLabel");

  try {
    const response = await fetch("./data/predictions.json?v=" + Date.now());

    const data = await response.json();
    allPredictions = data.predictions || [];

    if (data.generated_at) {
      generatedAtLabel.textContent =
        "Mise à jour : " + new Date(data.generated_at).toLocaleString("fr-FR");
    }

    renderPredictions();

  } catch (error) {
    container.innerHTML = "Erreur de chargement";
  }
}

function renderPredictions() {
  const container = document.getElementById("predictionsContainer");

  container.innerHTML = allPredictions.map(item => {

    const factors = (item.factors || [])
      .map(f => `<span class="factor">${f}</span>`)
      .join("");

    return `
      <div class="card">

        <div class="match">${item.home_team} vs ${item.away_team}</div>

        <div class="pick-box">
          ${item.pick}
        </div>

        <div class="metric">Cote : ${item.bookmaker_odds}</div>
        <div class="metric">Value : ${item.edge_points} pts</div>
        <div class="metric">Score : ${item.predicted_score}</div>

        <div class="metric">${item.analysis}</div>

        <div>${factors}</div>

      </div>
    `;

  }).join("");
}

loadPredictions();

</script>

</body>
</html>
