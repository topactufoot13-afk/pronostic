<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top Actu Foot 13 - Pronostics</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(84, 111, 255, 0.22), transparent 28%),
        radial-gradient(circle at top right, rgba(0, 220, 255, 0.12), transparent 26%),
        linear-gradient(180deg, #080d1c 0%, #0b1020 100%);
      color: #f8fbff;
    }

    .page {
      max-width: 1220px;
      margin: 0 auto;
      padding: 52px 22px 70px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 30px;
    }

    h1 {
      margin: 0;
      font-size: 48px;
    }

    .subtitle {
      color: #aeb9d5;
      margin-top: 10px;
    }

    .update {
      font-size: 13px;
      color: #ccc;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 20px;
    }

    .match {
      font-size: 20px;
      font-weight: bold;
    }

    .confidence {
      font-size: 12px;
      margin-top: 5px;
      color: #6ff2dd;
    }

    .pick {
      margin: 15px 0;
      font-size: 22px;
      font-weight: bold;
    }

    .metric {
      font-size: 14px;
      margin-bottom: 10px;
    }

    .analysis {
      font-size: 14px;
      margin: 10px 0;
    }

    .factor {
      display: inline-block;
      background: rgba(255,255,255,0.08);
      padding: 5px 10px;
      border-radius: 8px;
      margin: 3px;
      font-size: 12px;
    }

    .legal {
      margin-top: 50px;
      font-size: 12px;
      color: #aaa;
      line-height: 1.6;
    }
  </style>
</head>

<body>

<div class="page">

  <div class="hero">
    <div>
      <h1>Pronostics football du jour</h1>
      <div class="subtitle">
        Analyses basées sur les statistiques, la forme et les cotes du marché.
      </div>
    </div>
    <div class="update" id="date">--</div>
  </div>

  <div class="cards" id="app">Chargement...</div>

  <div class="legal">
    ⚠️ Les paris sportifs comportent des risques de dépendance et de pertes financières.
    Les informations sont fournies à titre informatif uniquement et ne constituent pas un conseil.
  </div>

</div>

<script>
function translatePick(pick) {
  if (!pick) return "--";
  pick = pick.toLowerCase();

  if (pick.includes("over 2.5")) return "+ de 2,5 buts";
  if (pick.includes("under 2.5")) return "- de 2,5 buts";
  if (pick.includes("over 1.5")) return "+ de 1,5 but";
  if (pick.includes("double chance")) return "Double chance";
  if (pick.includes("victoire domicile")) return "Victoire domicile";
  if (pick.includes("victoire extérieur")) return "Victoire extérieur";

  return pick;
}

function translateConfidence(c) {
  if (c === "high") return "Confiance élevée";
  if (c === "medium") return "Confiance moyenne";
  return "Confiance faible";
}

async function load() {
  const res = await fetch("./data/predictions.json?v=" + Date.now());
  const data = await res.json();

  document.getElementById("date").innerText =
    "Mise à jour : " + new Date(data.generated_at).toLocaleString("fr-FR");

  const html = data.predictions.map(p => `
    <div class="card">
      <div class="match">${p.home_team} vs ${p.away_team}</div>
      <div class="confidence">${translateConfidence(p.confidence_level)}</div>

      <div class="pick">${translatePick(p.pick)}</div>

      <div class="metric">Cote : ${p.bookmaker_odds}</div>

      <div class="analysis">${p.analysis}</div>

      <div>
        ${(p.factors || []).map(f => `<span class="factor">${f}</span>`).join("")}
      </div>
    </div>
  `).join("");

  document.getElementById("app").innerHTML = html;
}

load();
</script>

</body>
</html>
